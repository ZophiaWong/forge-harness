<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">c15a child sessions sequence</title>
  <desc id="desc">A sequence diagram showing the current session delegating a subtask to a fresh child session, the child reading the repo or editing an isolated worktree, and the result returning to the current session.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 24px ui-sans-serif, system-ui, sans-serif; fill: #0f172a; }
      .small { font: 14px ui-sans-serif, system-ui, sans-serif; fill: #334155; }
      .lane { stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 7 7; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
      .new { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
      .write { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
      .result { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2; rx: 8; }
      .label { font: 700 16px ui-sans-serif, system-ui, sans-serif; fill: #0f172a; }
      .mono { font: 14px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #334155; }
      .arrow { stroke: #475569; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .return { stroke: #4f46e5; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .note { font: 13px ui-sans-serif, system-ui, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1120" height="560" />
  <text class="title" x="56" y="54">c15a: a subtask leaves the current session, then returns as a handoff</text>
  <text class="small" x="56" y="82">The current session waits while the fresh child session runs. Only the result, evidence, and paths come back.</text>

  <g>
    <rect class="box" x="58" y="122" width="190" height="58" rx="8" />
    <text class="label" x="84" y="156">Current session</text>
    <line class="lane" x1="153" y1="180" x2="153" y2="488" />

    <rect class="box" x="318" y="122" width="160" height="58" rx="8" />
    <text class="label" x="360" y="156">delegate</text>
    <line class="lane" x1="398" y1="180" x2="398" y2="488" />

    <rect class="new" x="548" y="122" width="200" height="58" rx="8" />
    <text class="label" x="588" y="156">Fresh child session</text>
    <line class="lane" x1="648" y1="180" x2="648" y2="488" />

    <rect class="write" x="826" y="122" width="214" height="58" rx="8" />
    <text class="label" x="866" y="156">Repo / worktree</text>
    <line class="lane" x1="933" y1="180" x2="933" y2="488" />
  </g>

  <path class="arrow" d="M 153 224 L 398 224" />
  <text class="small" x="196" y="212">hand off a subtask</text>
  <text class="mono" x="196" y="244">task + profile</text>

  <path class="arrow" d="M 398 292 L 648 292" />
  <text class="small" x="448" y="280">start fresh child</text>
  <text class="note" x="448" y="312">no current raw history</text>

  <path class="arrow" d="M 648 360 L 933 360" />
  <text class="small" x="704" y="348">read repo or edit isolated worktree</text>
  <text class="note" x="704" y="380">available tools depend on profile</text>

  <path class="return" d="M 933 430 L 648 430 L 398 430" />
  <text class="small" x="680" y="418">return result, evidence, paths</text>

  <path class="return" d="M 398 472 L 153 472" />
  <text class="small" x="188" y="460">current session continues</text>

  <rect class="result" x="438" y="458" width="190" height="54" rx="8" />
  <text class="label" x="484" y="480">handoff</text>
  <text class="note" x="462" y="500">summary, evidence, paths</text>
</svg>
