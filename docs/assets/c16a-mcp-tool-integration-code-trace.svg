<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="650" viewBox="0 0 1180 650" role="img" aria-labelledby="title desc">
  <title id="title">c16a MCP Tool Integration Code Trace</title>
  <desc id="desc">A local code trace showing foreground startup trust and discovery, followed by each MCP tool call passing through the existing permission, runtime, result projection, and trace path.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 24px ui-sans-serif, system-ui, sans-serif; fill: #111827; }
      .subtitle { font: 14px ui-sans-serif, system-ui, sans-serif; fill: #4b5563; }
      .lane { fill: #f9fafb; stroke: #d1d5db; stroke-width: 1.5; rx: 8; }
      .new { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
      .existing { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 2; rx: 8; }
      .external { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
      .label { font: 700 15px ui-sans-serif, system-ui, sans-serif; fill: #111827; }
      .small { font: 13px ui-sans-serif, system-ui, sans-serif; fill: #374151; }
      .mono { font: 13px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #1f2937; }
      .arrow { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 7 6; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1180" height="650" />
  <text class="title" x="48" y="48">c16a: MCP tools enter the existing Forge action path</text>
  <text class="subtitle" x="48" y="76">Green boxes are new host-side adapter steps. Blue boxes are existing Forge boundaries. Orange is the external server.</text>

  <rect class="lane" x="40" y="100" width="1100" height="190" rx="8" />
  <text class="label" x="60" y="126">foreground startup</text>

  <rect class="new" x="70" y="158" width="205" height="72" rx="8" />
  <text class="label" x="92" y="184">load strict config</text>
  <text class="mono" x="92" y="208">baseCwd/.forge/mcp.json</text>

  <rect class="new" x="330" y="158" width="190" height="72" rx="8" />
  <text class="label" x="365" y="184">startup trust</text>
  <text class="small" x="355" y="208">command + cwd + policies</text>

  <rect class="external" x="575" y="158" width="190" height="72" rx="8" />
  <text class="label" x="606" y="184">stdio MCP server</text>
  <text class="mono" x="615" y="208">tools/list</text>

  <rect class="new" x="820" y="148" width="275" height="92" rx="8" />
  <text class="label" x="855" y="176">McpSession catalog</text>
  <text class="mono" x="845" y="200">discovered ∩ configured</text>
  <text class="small" x="845" y="222">definitions + raw mapping + policies</text>

  <path class="arrow" d="M 275 194 L 330 194" />
  <path class="arrow" d="M 520 194 L 575 194" />
  <path class="arrow" d="M 765 194 L 820 194" />

  <rect class="lane" x="40" y="315" width="1100" height="285" rx="8" />
  <text class="label" x="60" y="341">each agent round</text>

  <rect class="new" x="70" y="370" width="210" height="74" rx="8" />
  <text class="label" x="94" y="396">composite runtime</text>
  <text class="mono" x="94" y="420">toolDefinitions()</text>

  <rect class="existing" x="335" y="370" width="185" height="74" rx="8" />
  <text class="label" x="368" y="396">model request</text>
  <text class="mono" x="362" y="420">mcp_demo_...</text>

  <rect class="existing" x="575" y="360" width="205" height="94" rx="8" />
  <text class="label" x="600" y="388">Permission Policy</text>
  <text class="mono" x="604" y="412">allow | ask | deny</text>
  <text class="small" x="603" y="434">ask includes arguments</text>

  <rect class="new" x="835" y="360" width="245" height="94" rx="8" />
  <text class="label" x="864" y="388">explicit owner mapping</text>
  <text class="mono" x="860" y="412">exposed -&gt; runtime -&gt; raw</text>
  <text class="small" x="862" y="434">registered owner + raw map</text>

  <path class="arrow" d="M 280 407 L 335 407" />
  <path class="arrow" d="M 520 407 L 575 407" />
  <path class="arrow" d="M 780 407 L 835 407" />

  <rect class="external" x="835" y="500" width="245" height="62" rx="8" />
  <text class="label" x="890" y="526">tools/call raw name</text>
  <text class="mono" x="895" y="548">lookup_issue</text>

  <rect class="new" x="520" y="500" width="260" height="62" rx="8" />
  <text class="label" x="560" y="526">MCP result adapter</text>
  <text class="small" x="550" y="548">text + stable JSON -&gt; ToolResult</text>

  <rect class="existing" x="130" y="490" width="330" height="82" rx="8" />
  <text class="label" x="184" y="518">existing projection and evidence</text>
  <text class="mono" x="166" y="542">function_call_output + tool_result</text>
  <text class="small" x="211" y="562">ContextProjection + trace</text>

  <path class="arrow" d="M 957 454 L 957 500" />
  <path class="arrow" d="M 835 531 L 780 531" />
  <path class="arrow" d="M 520 531 L 460 531" />
  <path class="dash" d="M 176 444 L 176 490" />
  <text class="small" x="82" y="468">next round sees live definitions</text>
</svg>
