<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">c07 Runtime State numbered code-data flow</title>
  <desc id="desc">A four-step code-data-flow diagram for c07: 1. Loop emits TraceEvent; 2. Stateful recorder applies reducer; 3. Same event is forwarded to JSONL trace; 4. CLI reads RuntimeState summary.</desc>
  <style>
    .bg { fill: #f8fafc; }
    .step { fill: #ffffff; stroke: #334155; stroke-width: 2; }
    .step1 { fill: #ecfdf5; stroke: #047857; stroke-width: 2; }
    .step2 { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; }
    .step3 { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; }
    .step4 { fill: #f8fafc; stroke: #475569; stroke-width: 2; }
    .badge { fill: #0f172a; }
    .badgeText { fill: #ffffff; font: 700 16px ui-sans-serif, system-ui, sans-serif; }
    .title { fill: #0f172a; font: 700 20px ui-sans-serif, system-ui, sans-serif; }
    .label { fill: #0f172a; font: 700 17px ui-sans-serif, system-ui, sans-serif; }
    .small { fill: #334155; font: 14px ui-sans-serif, system-ui, sans-serif; }
    .mono { fill: #0f172a; font: 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .caption { fill: #475569; font: 13px ui-sans-serif, system-ui, sans-serif; }
    .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1120" height="560" />

  <text class="title" x="56" y="54">c07: from trace events to runtime state</text>
  <text class="caption" x="56" y="82">The loop emits one event stream. Runtime turns it into both trace history and a current snapshot.</text>

  <rect class="step1" x="56" y="132" width="236" height="220" rx="8" />
  <circle class="badge" cx="88" cy="166" r="18" />
  <text class="badgeText" x="83" y="172">1</text>
  <text class="label" x="116" y="164">Loop emits</text>
  <text class="label" x="116" y="188">TraceEvent</text>
  <text class="mono" x="84" y="232">record(event)</text>
  <text class="mono" x="84" y="262">tool_result</text>
  <text class="mono" x="84" y="292">final_answer</text>
  <text class="mono" x="84" y="322">session_ended</text>

  <rect class="step2" x="328" y="112" width="236" height="260" rx="8" />
  <circle class="badge" cx="360" cy="146" r="18" />
  <text class="badgeText" x="355" y="152">2</text>
  <text class="label" x="388" y="144">Stateful recorder</text>
  <text class="label" x="388" y="168">applies reducer</text>
  <text class="mono" x="358" y="214">applyRuntimeStateEvent()</text>
  <text class="mono" x="358" y="248">currentRound</text>
  <text class="mono" x="358" y="276">lastToolResult</text>
  <text class="mono" x="358" y="304">lastProblem</text>
  <text class="mono" x="358" y="332">finalAnswer</text>

  <rect class="step3" x="600" y="132" width="236" height="220" rx="8" />
  <circle class="badge" cx="632" cy="166" r="18" />
  <text class="badgeText" x="627" y="172">3</text>
  <text class="label" x="660" y="164">Same event</text>
  <text class="label" x="660" y="188">forwards to JSONL</text>
  <text class="mono" x="630" y="234">delegate.record(event)</text>
  <text class="mono" x="630" y="264">trace.jsonl</text>
  <text class="mono" x="630" y="294">sequence</text>
  <text class="mono" x="630" y="324">timestamp</text>

  <rect class="step4" x="872" y="132" width="236" height="220" rx="8" />
  <circle class="badge" cx="904" cy="166" r="18" />
  <text class="badgeText" x="899" y="172">4</text>
  <text class="label" x="932" y="164">CLI reads</text>
  <text class="label" x="932" y="188">state summary</text>
  <text class="mono" x="902" y="234">getState()</text>
  <text class="mono" x="902" y="264">[round N] state</text>
  <text class="mono" x="902" y="294">[state] completed</text>
  <text class="mono" x="902" y="324">[state] failed</text>

  <path class="arrow" d="M292 242 H328" />
  <path class="arrow" d="M564 242 H600" />
  <path class="arrow" d="M836 242 H872" />

  <text class="small" x="56" y="420">What stays true:</text>
  <text class="mono" x="56" y="452">runMinimalLoop still emits TraceEvent only; it does not mutate RuntimeState directly.</text>
  <text class="mono" x="56" y="480">createRuntimeStateRecorder updates RuntimeState, then forwards the same event to JsonlTraceRecorder.</text>
  <text class="caption" x="56" y="520">RuntimeState is an in-memory snapshot. trace.jsonl remains the persistent record.</text>
</svg>
