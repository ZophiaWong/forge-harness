<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720" role="img" aria-labelledby="title desc">
  <title id="title">c16b Plugin Registration and Ownership Flow</title>
  <desc id="desc">The host reads plugin configuration and manifests, creates namespaced descriptors, and routes skills, hooks, MCP servers, and exact tool policies into existing Forge subsystems.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 24px ui-sans-serif, system-ui, sans-serif; fill: #111827; }
      .subtitle { font: 14px ui-sans-serif, system-ui, sans-serif; fill: #4b5563; }
      .lane { fill: #f9fafb; stroke: #d1d5db; stroke-width: 1.5; }
      .host { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 2; }
      .plugin { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; }
      .boundary { fill: #ecfdf5; stroke: #047857; stroke-width: 2.4; }
      .policy { fill: #fdf4ff; stroke: #a21caf; stroke-width: 2; }
      .label { font: 700 15px ui-sans-serif, system-ui, sans-serif; fill: #111827; }
      .small { font: 13px ui-sans-serif, system-ui, sans-serif; fill: #374151; }
      .mono { font: 13px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #1f2937; }
      .arrow { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 1.8; stroke-dasharray: 7 6; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1180" height="720" />
  <text class="title" x="42" y="45">c16b: one loading boundary, existing component owners</text>
  <text class="subtitle" x="42" y="73">The plugin declares components. Forge owns path safety, namespace, trust, policy, registration, routing, and evidence.</text>

  <rect class="lane" x="35" y="96" width="250" height="580" rx="10" />
  <text class="label" x="55" y="124">project + plugin files</text>

  <rect class="host" x="60" y="150" width="200" height="94" rx="8" />
  <text class="label" x="89" y="178">host configuration</text>
  <text class="mono" x="82" y="202">.forge/plugins.json</text>
  <text class="small" x="79" y="225">enabled + path + mcpPolicies</text>

  <rect class="plugin" x="60" y="280" width="200" height="116" rx="8" />
  <text class="label" x="96" y="308">plugin manifest</text>
  <text class="mono" x="79" y="332">.forge-plugin/plugin.json</text>
  <text class="small" x="91" y="356">skills · hooks · mcpServers</text>
  <text class="small" x="85" y="378">paths and declarations only</text>

  <rect class="plugin" x="60" y="432" width="200" height="126" rx="8" />
  <text class="label" x="104" y="460">component files</text>
  <text class="mono" x="87" y="486">SKILL.md · hooks.json</text>
  <text class="mono" x="92" y="510">*.mjs · mcp.json</text>
  <text class="small" x="90" y="536">MCP process starts later</text>

  <rect class="lane" x="315" y="96" width="340" height="580" rx="10" />
  <text class="label" x="335" y="124">Forge loading boundary</text>

  <rect class="boundary" x="345" y="150" width="280" height="132" rx="8" />
  <text class="label" x="422" y="178">strict preflight</text>
  <text class="small" x="374" y="204">schema · realpath containment · tokens</text>
  <text class="small" x="371" y="228">component validity · policy references</text>
  <text class="small" x="379" y="252">all collisions reported before trust</text>

  <rect class="boundary" x="345" y="318" width="280" height="128" rx="8" />
  <text class="label" x="394" y="346">immutable descriptor</text>
  <text class="mono" x="380" y="372">plugin:local-skill</text>
  <text class="mono" x="374" y="396">plugin-local-server</text>
  <text class="mono" x="362" y="420">mcp_plugin-server_raw</text>

  <rect class="boundary" x="345" y="482" width="280" height="128" rx="8" />
  <text class="label" x="412" y="510">session activation</text>
  <text class="small" x="377" y="536">trust every plugin before code runs</text>
  <text class="small" x="375" y="560">import hooks · spawn MCP in order</text>
  <text class="small" x="369" y="584">emit one startup health snapshot</text>

  <path class="arrow" d="M 260 197 L 345 197" />
  <path class="arrow" d="M 260 338 L 345 216" />
  <path class="arrow" d="M 260 495 L 345 238" />
  <path class="arrow" d="M 485 282 L 485 318" />
  <path class="arrow" d="M 485 446 L 485 482" />

  <rect class="lane" x="685" y="96" width="460" height="580" rx="10" />
  <text class="label" x="705" y="124">existing subsystem owners</text>

  <rect class="host" x="720" y="150" width="390" height="102" rx="8" />
  <text class="label" x="750" y="179">PromptAssets / slash parser</text>
  <text class="mono" x="750" y="205">/triage</text>
  <text class="mono" x="840" y="205">/issue-workflow:triage</text>
  <text class="small" x="750" y="229">project skills first; approved plugin skills follow</text>

  <rect class="host" x="720" y="286" width="390" height="102" rx="8" />
  <text class="label" x="750" y="315">LifecycleEmitter</text>
  <text class="mono" x="750" y="341">built-in hooks → plugin order → registry order</text>
  <text class="small" x="750" y="365">deep-frozen event clone; failure records hook_result</text>

  <rect class="host" x="720" y="422" width="390" height="102" rx="8" />
  <text class="label" x="750" y="451">McpSession + composite runtime</text>
  <text class="mono" x="750" y="477">final tool name → owner session → raw name</text>
  <text class="small" x="750" y="501">allow/ask exposed · deny/extra hidden · failures continue</text>

  <rect class="policy" x="720" y="558" width="390" height="82" rx="8" />
  <text class="label" x="750" y="587">exact-name Permission Policy</text>
  <text class="mono" x="750" y="613">Map&lt;finalToolName, allow | ask | deny&gt;</text>

  <path class="arrow" d="M 625 536 C 670 536 674 201 720 201" />
  <path class="arrow" d="M 625 546 C 675 546 670 337 720 337" />
  <path class="arrow" d="M 625 556 C 680 556 675 473 720 473" />
  <path class="dash" d="M 915 524 L 915 558" />

  <text class="small" x="75" y="638">orange = plugin-owned input</text>
  <text class="small" x="359" y="638">green = c16b boundary</text>
  <text class="small" x="735" y="662">blue/purple = host-owned runtime and governance</text>
</svg>
