<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">c05 Context Projection flow</title>
  <desc id="desc">A focused flow diagram for c05. A tool result becomes an observation, ContextProjection formats it, and the loop feeds projected function call output back to the model.</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .soft { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; rx: 8; }
    .new { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
    .label { fill: #0f172a; font: 700 18px ui-sans-serif, system-ui, sans-serif; }
    .small { fill: #334155; font: 14px ui-sans-serif, system-ui, sans-serif; }
    .mono { fill: #0f172a; font: 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .caption { fill: #475569; font: 13px ui-sans-serif, system-ui, sans-serif; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="960" height="520" />

  <text class="label" x="48" y="54">c05: ToolResult becomes projected context</text>
  <text class="caption" x="48" y="80">Only tool result feedback changes. Tool Runtime and PermissionPolicy stay on the existing boundary.</text>

  <rect class="box" x="54" y="138" width="180" height="92" />
  <text class="label" x="86" y="174">Tool Runtime</text>
  <text class="mono" x="82" y="204">ToolResult</text>

  <rect class="new" x="304" y="128" width="190" height="112" />
  <text class="label" x="346" y="164">Observation</text>
  <text class="mono" x="330" y="194">toolName/status</text>
  <text class="mono" x="330" y="216">summary/content</text>

  <rect class="new" x="564" y="128" width="210" height="112" />
  <text class="label" x="592" y="164">ContextProjection</text>
  <text class="mono" x="596" y="194">format summary</text>
  <text class="mono" x="596" y="216">+ content</text>

  <rect class="soft" x="318" y="326" width="430" height="128" />
  <text class="label" x="354" y="364">function_call_output</text>
  <text class="mono" x="354" y="394">tool: grep</text>
  <text class="mono" x="354" y="418">status: completed</text>
  <text class="mono" x="354" y="442">observation: grep found ...</text>

  <path class="arrow" d="M234 184 H304" />
  <path class="arrow" d="M494 184 H564" />
  <path class="arrow" d="M669 240 V326" />
  <path class="arrow" d="M318 390 H184 C110 390 96 240 138 230" />

  <text class="small" x="248" y="262">ToolResult -> Observation</text>
  <text class="small" x="536" y="262">projected function_call_output</text>
  <text class="small" x="318" y="486">Model sees projected context, not raw tool output.</text>
</svg>
