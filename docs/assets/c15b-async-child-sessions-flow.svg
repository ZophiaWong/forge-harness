<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">c15b async child sessions flow</title>
  <desc id="desc">A sequence diagram showing a parent session starting an async child session, continuing foreground work, receiving a child notification, and gating final answer until child sessions finish.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 24px ui-sans-serif, system-ui, sans-serif; fill: #0f172a; }
      .small { font: 14px ui-sans-serif, system-ui, sans-serif; fill: #334155; }
      .lane { stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 7 7; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
      .async { fill: #ecfeff; stroke: #0e7490; stroke-width: 2; rx: 8; }
      .notify { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2; rx: 8; }
      .gate { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
      .label { font: 700 16px ui-sans-serif, system-ui, sans-serif; fill: #0f172a; }
      .mono { font: 14px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #334155; }
      .note { font: 13px ui-sans-serif, system-ui, sans-serif; fill: #475569; }
      .arrow { stroke: #475569; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .return { stroke: #4f46e5; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .warn { stroke: #c2410c; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1120" height="560" />
  <text class="title" x="56" y="54">c15b: async child sessions return through notifications</text>
  <text class="small" x="56" y="82">The parent starts a child, keeps working, then sees terminal handoff before final answer is accepted.</text>

  <g>
    <rect class="box" x="58" y="122" width="190" height="58" rx="8" />
    <text class="label" x="84" y="156">Parent session</text>
    <line class="lane" x1="153" y1="180" x2="153" y2="492" />

    <rect class="async" x="320" y="122" width="210" height="58" rx="8" />
    <text class="label" x="358" y="156">Async registry</text>
    <line class="lane" x1="425" y1="180" x2="425" y2="492" />

    <rect class="async" x="606" y="122" width="214" height="58" rx="8" />
    <text class="label" x="654" y="156">Child session</text>
    <line class="lane" x1="713" y1="180" x2="713" y2="492" />

    <rect class="gate" x="878" y="122" width="184" height="58" rx="8" />
    <text class="label" x="922" y="156">Final gate</text>
    <line class="lane" x1="970" y1="180" x2="970" y2="492" />
  </g>

  <path class="arrow" d="M 153 222 L 425 222" />
  <text class="small" x="196" y="210">delegate(runInBackground=true)</text>
  <text class="mono" x="196" y="242">task + profile + maxToolRounds</text>

  <path class="arrow" d="M 425 282 L 713 282" />
  <text class="small" x="480" y="270">start child promise</text>

  <path class="return" d="M 425 322 L 153 322" />
  <text class="small" x="206" y="310">tool result returns immediately</text>
  <text class="mono" x="206" y="342">status: running + trace path</text>

  <path class="arrow" d="M 153 352 L 153 420" />
  <text class="small" x="176" y="372">parent keeps reading, planning, or using tools</text>
  <text class="note" x="176" y="394">no wait on the delegate tool call</text>

  <path class="return" d="M 713 424 L 425 424 L 153 424" />
  <text class="small" x="470" y="412">terminal notification</text>
  <text class="mono" x="470" y="444">&lt;child_session_notification&gt;</text>

  <path class="warn" d="M 153 480 L 970 480" />
  <text class="small" x="322" y="468">candidate final checks registry first</text>
  <text class="note" x="322" y="502">running child injects a running notice and the loop continues</text>
</svg>
