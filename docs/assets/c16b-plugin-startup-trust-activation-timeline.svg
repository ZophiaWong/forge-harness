<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="700" viewBox="0 0 1180 700" role="img" aria-labelledby="title desc">
  <title id="title">c16b Startup Trust and Activation Timeline</title>
  <desc id="desc">A left-to-right startup timeline showing that full preflight happens before trace and worktree creation, every trust decision completes before plugin code runs, and MCP servers start sequentially before the agent loop.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 24px ui-sans-serif, system-ui, sans-serif; fill: #111827; }
      .subtitle { font: 14px ui-sans-serif, system-ui, sans-serif; fill: #4b5563; }
      .grid { stroke: #d1d5db; stroke-width: 1; }
      .flow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .lane { font: 700 14px ui-sans-serif, system-ui, sans-serif; fill: #111827; }
      .small { font: 12px ui-sans-serif, system-ui, sans-serif; fill: #374151; }
      .mono { font: 12px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #1f2937; }
      .safe { fill: #ecfdf5; stroke: #047857; stroke-width: 2; }
      .host { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 2; }
      .trust { fill: #fefce8; stroke: #a16207; stroke-width: 2; }
      .code { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; }
      .event { fill: #fdf4ff; stroke: #a21caf; stroke-width: 2; }
      .barrier { stroke: #b91c1c; stroke-width: 3; stroke-dasharray: 8 6; }
      .barrierText { font: 700 12px ui-sans-serif, system-ui, sans-serif; fill: #991b1b; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1180" height="700" />
  <text class="title" x="42" y="44">c16b startup: trust is a barrier, not a side effect of import</text>
  <text class="subtitle" x="42" y="72">Nothing from an enabled plugin executes until every standalone and plugin session-trust decision has finished.</text>

  <line class="flow" x1="165" y1="112" x2="1140" y2="112" />
  <text class="small" x="166" y="99">startup begins</text>
  <text class="small" x="1078" y="99">agent loop</text>

  <text class="lane" x="42" y="164">Config / safety</text>
  <text class="lane" x="42" y="254">Session host</text>
  <text class="lane" x="42" y="344">Trust prompts</text>
  <text class="lane" x="42" y="434">Plugin code</text>
  <text class="lane" x="42" y="524">MCP startup</text>
  <text class="lane" x="42" y="614">Registration</text>

  <line class="grid" x1="165" y1="132" x2="1140" y2="132" />
  <line class="grid" x1="165" y1="222" x2="1140" y2="222" />
  <line class="grid" x1="165" y1="312" x2="1140" y2="312" />
  <line class="grid" x1="165" y1="402" x2="1140" y2="402" />
  <line class="grid" x1="165" y1="492" x2="1140" y2="492" />
  <line class="grid" x1="165" y1="582" x2="1140" y2="582" />
  <line class="grid" x1="165" y1="662" x2="1140" y2="662" />

  <rect class="safe" x="180" y="148" width="145" height="54" rx="8" />
  <text class="small" x="200" y="172">assets + configs</text>
  <text class="mono" x="204" y="190">no trace · no code</text>

  <rect class="safe" x="345" y="148" width="145" height="54" rx="8" />
  <text class="small" x="373" y="172">full preflight</text>
  <text class="mono" x="365" y="190">aggregate issues</text>

  <rect class="host" x="510" y="238" width="135" height="54" rx="8" />
  <text class="small" x="527" y="262">trace emitter</text>
  <text class="mono" x="524" y="280">+ worktree</text>

  <rect class="host" x="665" y="238" width="120" height="54" rx="8" />
  <text class="small" x="681" y="262">descriptors</text>
  <text class="mono" x="682" y="280">deep-frozen</text>

  <rect class="trust" x="665" y="328" width="105" height="54" rx="8" />
  <text class="small" x="681" y="352">standalone</text>
  <text class="mono" x="696" y="370">trust</text>

  <rect class="trust" x="785" y="328" width="105" height="54" rx="8" />
  <text class="small" x="806" y="352">plugin 1</text>
  <text class="mono" x="804" y="370">full trust</text>

  <rect class="trust" x="905" y="328" width="105" height="54" rx="8" />
  <text class="small" x="926" y="352">plugin 2</text>
  <text class="mono" x="918" y="370">skill-only</text>

  <line class="barrier" x1="1022" y1="132" x2="1022" y2="650" />
  <text class="barrierText" x="932" y="136">all trust complete</text>

  <rect class="code" x="1035" y="418" width="105" height="54" rx="8" />
  <text class="small" x="1052" y="442">import hooks</text>
  <text class="mono" x="1056" y="460">approved only</text>

  <rect class="host" x="1035" y="238" width="105" height="54" rx="8" />
  <text class="small" x="1052" y="262">runtime emitter</text>
  <text class="mono" x="1051" y="280">built-in → plugin</text>

  <rect class="code" x="1035" y="508" width="48" height="54" rx="8" />
  <text class="small" x="1044" y="531">direct</text>
  <text class="mono" x="1045" y="549">MCP</text>

  <rect class="code" x="1092" y="508" width="48" height="54" rx="8" />
  <text class="small" x="1098" y="531">plugin</text>
  <text class="mono" x="1100" y="549">MCP</text>

  <rect class="event" x="1035" y="598" width="105" height="48" rx="8" />
  <text class="small" x="1045" y="618">skills + policy</text>
  <text class="mono" x="1043" y="637">activation event</text>

  <path class="flow" d="M 325 175 L 345 175" />
  <path class="flow" d="M 490 175 C 500 175 500 265 510 265" />
  <path class="flow" d="M 645 265 L 665 265" />
  <path class="flow" d="M 725 292 L 725 328" />
  <path class="flow" d="M 770 355 L 785 355" />
  <path class="flow" d="M 890 355 L 905 355" />
  <path class="flow" d="M 1010 355 C 1028 355 1025 445 1035 445" />
  <path class="flow" d="M 1087 418 L 1087 292" />
  <path class="flow" d="M 1087 292 C 1060 330 1059 470 1059 508" />
  <path class="flow" d="M 1083 535 L 1092 535" />
  <path class="flow" d="M 1116 562 L 1116 598" />

  <text class="small" x="180" y="688">Any preflight issue stops before trace/worktree/trust. Rejected plugins emit evidence but never import code or start MCP.</text>
</svg>
